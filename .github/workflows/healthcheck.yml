name: Healthcheck

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: healthcheck
  cancel-in-progress: false

jobs:
  check:
    name: Run healthchecks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run healthcheck
        id: run_check
        run: python healthcheck.py
        continue-on-error: true
        env:
          TEAMS_EMAIL: ${{ secrets.TEAMS_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

      - name: Generate summary output
        if: always()
        continue-on-error: true
        run: |
          import json
          import glob
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          
          # Find the latest results file
          data_dir = Path("docs/data")
          result_files = sorted(data_dir.glob("results-*.json"), reverse=True)
          
          if not result_files:
              print("::error::No results found")
              exit(1)
          
          with open(result_files[0], 'r', encoding='utf-8') as f:
              results = json.load(f)
          
          ok_count = sum(1 for r in results if r.get('status') == 'ok')
          error_count = sum(1 for r in results if r.get('status') != 'ok')
          
          summary_text = "📋 **Healthcheck Summary**\n\n"
          summary_text += f"✅ Operational: **{ok_count}**\n"
          summary_text += f"❌ Issues: **{error_count}**\n\n"
          summary_text += "**Services:**\n"
          
          for r in sorted(results, key=lambda x: x['url']):
              icon = "✅" if r.get('status') == 'ok' else "❌"
              url = r.get('url', 'N/A')
              summary_text += f"{icon} {url}\n"
          
          # Write to GitHub step summary
          with open(Path(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')), 'a') as f:
              f.write(summary_text)
        shell: python

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: update healthcheck results $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
